# Render blueprint for the whole IssueHub app — backend + frontend in one account.
# Import this repo at https://render.com → "New +" → "Blueprint" to create both at once.
#
# DATABASE_URL is intentionally NOT here — set it as a secret in the Render
# dashboard (it contains the Neon password).

services:
  # --- Backend: FastAPI web service ---
  - type: web
    name: issuehub-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    # Apply migrations on every deploy, then start the API on Render's $PORT.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        sync: false            # set in dashboard: your Neon connection string
      - key: JWT_SECRET
        generateValue: true    # Render generates a strong secret
      - key: CORS_ORIGINS
        sync: false            # set to the frontend static-site URL (see README)
      - key: AI_PROVIDER
        value: mock

  # --- Frontend: static React/Vite site ---
  - type: web
    name: issuehub-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      # SPA fallback: serve index.html for client-side routes (deep links/refresh).
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Build-time. Set in dashboard to the backend URL + /api, e.g.
      #   https://issuehub-backend.onrender.com/api
      - key: VITE_API_URL
        sync: false
